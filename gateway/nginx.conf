events {}

http {
    server {
        listen 80;

        # Port Number
        # auth-service:3000
        # user-service:3001
        # frontend:5173
        # question-service:3002
        # matching-service:3003
        # collaboration-service:3004
        # code-execution-service:3006

        # PUBLIC: Login and Signup go directly to User Service
        location /user/auth/github {
            proxy_pass http://user-service:3001;
        }

        location /user/user/login {
            proxy_pass http://user-service:3001;
        }

        location /user/admin/login {
            proxy_pass http://user-service:3001;
        }

        # PROTECTED: Everything else goes to the Auth Bouncer first
        location /api/ {
            proxy_pass http://auth-service:3000;

            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Allow long-running requests (code execution, image pulls)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Matching service (trusted x-user-id from client; same gateway hop as /api from browser)
        location /matching {
            proxy_pass http://matching-service:3003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route to Frontend (Port 3000)
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
