events {}

http {
    server {
        listen 80;

        # PUBLIC: Login and Signup go directly to User Service
        location /user/auth/github {
            proxy_pass http://user-service:3001;
        }

        location /user/user/login {
            proxy_pass http://user-service:3001;
        }

        # PROTECTED: Everything else goes to the Auth Bouncer first
        location /api/ {
            proxy_pass http://auth-service:3000;
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route to Frontend (Port 3000)
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}