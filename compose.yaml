services:
  # react-prod:
  #     build:
  #       context: ./
  #       dockerfile: Dockerfile
  #     image: docker-reactjs-sample
  #     ports:
  #       - "8080:8080"

  # The Gateway is your entry point
  gateway:
    image: nginx:alpine
    ports:
      - "80:80" # You visit http://localhost in your browser
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - user-service
      - question-service

  auth-service:
    ports:
      - "3000:3000"
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./services/auth-service/src:/usr/src/app/src
    develop:
      watch:
        - action: sync+restart
          path: ./services/auth-service/src
          target: /usr/src/app/src # Changed from /app to /usr/src/app/src
        - action: rebuild
          path: ./services/auth-service/package.json

  # --- FRONTEND SERVICE ---
  frontend:
    ports:
      - "5173:5173"
    build:
      context: ./Peerprep-app # Path to your frontend folder
      dockerfile: Dockerfile.dev
    develop:
      watch:
        - action: sync
          path: ./Peerprep-app # Watch only frontend changes
          target: /Peerprep-app
        - action: sync
          path: ./services/question-service # Watch only frontend changes
          target: /Peerprep-app

    environment:
      - CHOKIDAR_USEPOLLING=true

  # --- USER SERVICE ---
  user-service:
    ports:
      - "3001:3001"
    build:
      context: ./services/user-service # Path to your user service folder
      dockerfile: Dockerfile
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./services/user-service/src:/usr/src/app/src
    develop:
      watch:
        - action: sync+restart
          path: ./services/user-service/src
          target: /usr/src/app/src # Changed from /app to /usr/src/app/src
        - action: rebuild
          path: ./services/user-service/package.json

  # --- SERVICE 2 (e.g., Matching Service) ---
  # matching-service:
  #   build:
  #     context: ./matching-service
  #     dockerfile: Dockerfile

  # --- SERVICE 3 (e.g., Question Service) ---
  question-service:
    ports:
      - "3002:3002"
    env_file:
      - ./services/question-service/.env
    platform: linux/amd64
    build:
      context: ./services/question-service
      dockerfile: Dockerfile
    depends_on:
      - auth-service # if it depends on auth
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ./services/question-service
          target: /app
    # image: golang
    # develop:
    #   watch:
    #     - action: sync
    #       path: ./services/question-service
    #       target: /app
  # --- OPTIONAL: DATABASE ---
  # db:
  #   image: mongo:latest            # Or postgres, redis, etc.
  #   ports:
  #     - "27017:27017"

  # --- COLLABORATION SERVICE ---
  collaboration-service:
    ports:
      - "3004:3004"
    env_file:
      - ./services/collaboration-service/.env
    build:
      context: ./services/collaboration-service
      dockerfile: Dockerfile
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./services/collaboration-service/src:/usr/src/app/src
    develop:
      watch:
        - action: sync+restart
          path: ./services/collaboration-service/src
          target: /usr/src/app/src
        - action: rebuild
          path: ./services/collaboration-service/package.json
    depends_on:
      - collaboration-db

  collaboration-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collaboration_db
    volumes:
      - collaboration_db_data:/var/lib/postgresql/data

volumes:
  collaboration_db_data:
