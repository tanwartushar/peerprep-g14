name: Deploy Peerprep Microservices

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: arn-aws
    strategy:
      # This matrix matches your ACTUAL folder names from the image
      matrix:
        include:
          - service_name: auth-service
            folder: services/auth-service
          - service_name: user-service
            folder: services/user-service
          - service_name: matching-service
            folder: services/matching-service
          - service_name: question-service
            folder: services/question-service
          - service_name: collaboration-service
            folder: services/collaboration-service
          - service_name: ai-service
            folder: services/ai-service
          - service_name: code-execution-service
            folder: services/code-execution
          - service_name: frontend
            folder: Peerprep-app # Matches your Peerprep-app folder

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.ARN_ROLE }}
        aws-region: ap-southeast-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # Note: You should create 6 ECR repos named e.g. peerprep-auth-service
        REPO_NAME: peerprep-g-14-${{ matrix.service_name }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Initialize an empty string for build arguments
        BUILD_ARGS=""

        # Only if the current matrix service is "frontend", we add the Firebase args
        if [ "${{ matrix.service_name }}" == "frontend" ]; then
          BUILD_ARGS="--build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
                      --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
                      --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
                      --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
                      --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
                      --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}"
        fi

        # Run the build using the dynamically generated BUILD_ARGS
        docker build $BUILD_ARGS \
          -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG \
          -t $ECR_REGISTRY/$REPO_NAME:latest \
          -f ./${{ matrix.folder }}/Dockerfile.prod \
          ./${{ matrix.folder }}
        
        # Now both tags exist locally and can be pushed
        docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
        docker push $ECR_REGISTRY/$REPO_NAME:latest

    - name: Update ECS Service
      run: |
        # Use matrix.service_name to target the specific service for THIS loop
        aws ecs update-service --cluster  peerpre-g-14 \
                               --service ${{ matrix.service_name }} \
                               --force-new-deployment
