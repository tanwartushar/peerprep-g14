name: Deploy Peerprep Microservices

on:
  push:
    branches: [ "AWS-integration" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: arn-aws
    strategy:
      # This matrix matches your ACTUAL folder names from the image
      matrix:
        include:
          - service_name: auth-service
            folder: services/auth-service
          - service_name: user-service
            folder: services/user-service
          - service_name: matching-service
            folder: services/matching-service
          - service_name: question-service
            folder: services/question-service
          - service_name: collaboration-service
            folder: services/collaboration-service
          - service_name: frontend
            folder: Peerprep-app # Matches your Peerprep-app folder

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.ARN_ROLE }}
        aws-region: ap-southeast-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # Note: You should create 6 ECR repos named e.g. peerprep-auth-service
        REPO_NAME: peerprep-${{ matrix.service_name }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Use the folder from the matrix to find the Dockerfile
        docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG -f ./${{ matrix.folder }}/Dockerfile.prod ./${{ matrix.folder }}
        docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

    - name: Update ECS Service
      run: |
        # Use matrix.service_name to target the specific service for THIS loop
        aws ecs update-service --cluster peerprep-cluster \
                               --service ${{ matrix.service_name }} \
                               --force-new-deployment
